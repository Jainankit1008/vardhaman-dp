<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vardhaman Varshitapotsav — DP Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ── Reset & tokens ──────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4A017;
  --gold2:#F5D06A;
  --teal:#0f5c4a;
  --teal2:#1a8a6a;
  --bg:#fdf8ef;
  --card:#fff;
  --text:#1a1209;
  --text2:#5a4a2a;
  --text3:#9a8a6a;
  --border:#e8d9b8;
  --shadow:0 4px 24px rgba(60,30,0,.15);
  --radius:20px;
  --rad-sm:10px;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);font-size:15px;overflow-x:hidden}

/* ── Modern Layout ───────────────────────────────────────────── */
.page{max-width:480px;margin:0 auto;padding:0 20px 60px}

header{
  background:linear-gradient(135deg,#1a0a00 0%,#3b1a00 50%,#0f5c4a 100%);
  padding:40px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
  margin-bottom:30px;
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
}
header h1{ font-family:'Cinzel',serif; font-size:22px; color:var(--gold2); text-shadow:0 2px 10px rgba(0,0,0,0.5); }
header p{ font-size:13px; color:rgba(245,208,106,.8); margin-top:8px; }

/* ── Modern Login UI ─────────────────────────────────────────── */
.login-card {
  background: var(--card);
  padding: 35px 25px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  text-align: center;
  border: 1px solid var(--border);
}
.login-card h2 { font-family: 'Cinzel', serif; color: var(--teal); margin-bottom: 10px; }
.login-card p { font-size: 14px; color: var(--text3); margin-bottom: 25px; }

.field{margin-bottom:20px; text-align: left;}
.field label{display:block; font-size:11px; font-weight:800; color:var(--teal); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px}
.field input{
  width:100%; padding:14px; border:2px solid #f0f0f0; border-radius:var(--rad-sm);
  font-size:15px; transition: all 0.3s ease;
}
.field input:focus{ border-color: var(--gold); background: #fff; box-shadow: 0 0 0 4px rgba(212,160,23,0.1); outline: none; }

/* ── Interactive Cropper ────────────────────────────────────── */
.crop-host {
  position:relative; border-radius:var(--radius); overflow:hidden;
  background:#000; touch-action:none; user-select:none;
  aspect-ratio:1/1; width:100%; cursor: move;
  box-shadow: var(--shadow);
}
.crop-host canvas { width: 100%; height: 100%; display: block; }

/* ── Buttons & UI ────────────────────────────────────────────── */
.btn{
  width:100%; padding:15px; border-radius:var(--rad-sm);
  font-size:16px; font-weight:800; cursor:pointer; border:none;
  transition:all 0.2s ease;
}
.btn-primary{ background: var(--gold); color:#fff; }
.btn-success{ background: var(--teal); color:#fff; margin-top: 15px;}
.btn-ghost { background: transparent; color: var(--text3); margin-top: 10px; font-size: 14px;}

.steps{ display:flex; justify-content:center; gap:10px; margin-bottom:30px; }
.step-dot{ width:10px; height:10px; border-radius:50%; background: var(--border); transition: 0.3s; }
.step-dot.active{ background: var(--gold); width: 30px; border-radius: 10px; }

.screen{display:none; animation:fadeUp 0.4s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0; transform:translateY(20px)}to{opacity:1; transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <h1>Vardhaman Varshitapotsav</h1>
  <p>DP Generator • श्री वर्धमान जैन मंडल</p>
</header>

<div class="page">
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <div id="s1" class="screen active">
    <div class="login-card">
      <h2>Welcome 🙏</h2>
      <p>Enter your details to generate your DP</p>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="inp-name" placeholder="e.g. Ankit Jain" />
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="inp-email" placeholder="name@domain.com" />
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Get Started →</button>
    </div>
  </div>

  <div id="s2" class="screen">
    <div class="login-card">
      <h2>Upload Photo 📷</h2>
      <p>Select a clear photo for the circular frame</p>
      <div style="border: 2px dashed var(--border); padding: 40px; border-radius: 15px; cursor: pointer" onclick="document.getElementById('fileInput').click()">
        <p style="color: var(--teal); font-weight: 700;">Tap to select</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)" />
      <button class="btn btn-ghost" onclick="showScreen(1)">← Back</button>
    </div>
  </div>

  <div id="s3" class="screen">
    <div class="login-card" style="padding: 15px;">
      <h2 style="margin-bottom: 5px;">Perfect Your DP</h2>
      <p style="margin-bottom: 15px;">Drag to move • Pinch/Scroll to zoom</p>
      
      <div class="crop-host" id="cropHost">
        <canvas id="mainCanvas"></canvas>
      </div>

      <button class="btn btn-success" id="dlBtn" onclick="downloadDP()">⬇ Download DP</button>
      <button class="btn btn-ghost" onclick="showScreen(2)">Change Photo</button>
    </div>
  </div>
</div>

<script>
const BASE_URL = window.location.origin;
const CIRCLE = { fx: 0.50, fy: 0.310, fr: 0.142 };

let user = { name: '', email: '' };
let rawImg = null, tmplImg = null;
let cs = { x: 0.5, y: 0.5, scale: 1 }; // Crop State
let isDragging = false, startX, startY, startTouchDist = 0;

// Load Template
const tmpl = new Image();
tmpl.src = BASE_URL + '/template.jpg';
tmpl.onload = () => { tmplImg = tmpl; };

function doLogin() {
  user.name = document.getElementById('inp-name').value.trim();
  user.email = document.getElementById('inp-email').value.trim();
  if(!user.name || !user.email) return alert("Please fill all fields");
  showScreen(2);
}

function showScreen(n) {
  ['s1','s2','s3'].forEach((id,i) => document.getElementById(id).classList.toggle('active', i+1 === n));
  ['dot1','dot2','dot3'].forEach((id,i) => document.getElementById(id).classList.toggle('active', i+1 === n));
}

function handleFile(e) {
  const f = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { 
      rawImg = img; 
      cs = { x: 0.5, y: 0.5, scale: 1 };
      showScreen(3);
      initInteraction();
      draw();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
}

function initInteraction() {
  const el = document.getElementById('cropHost');
  
  // Mouse Drag
  el.onmousedown = e => { isDragging = true; startX = e.clientX; startY = e.clientY; };
  window.onmousemove = e => {
    if(!isDragging) return;
    cs.x -= (e.clientX - startX) / (el.offsetWidth * cs.scale);
    cs.y -= (e.clientY - startY) / (el.offsetHeight * cs.scale);
    startX = e.clientX; startY = e.clientY;
    draw();
  };
  window.onmouseup = () => isDragging = false;

  // Touch Move & Pinch Zoom
  el.ontouchstart = e => {
    isDragging = true;
    if(e.touches.length === 2) {
      startTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    } else {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    }
  };
  el.ontouchmove = e => {
    e.preventDefault();
    if(e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
      cs.scale *= (dist / startTouchDist);
      startTouchDist = dist;
    } else {
      cs.x -= (e.touches[0].clientX - startX) / (el.offsetWidth * cs.scale);
      cs.y -= (e.touches[0].clientY - startY) / (el.offsetHeight * cs.scale);
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    }
    draw();
  };
  el.ontouchend = () => isDragging = false;

  // Scroll Zoom
  el.onwheel = e => {
    e.preventDefault();
    cs.scale -= e.deltaY * 0.001;
    cs.scale = Math.max(0.1, cs.scale);
    draw();
  };
}

function draw() {
  const cv = document.getElementById('mainCanvas');
  const ctx = cv.getContext('2d');
  if(!tmplImg || !rawImg) return;

  const size = tmplImg.width;
  cv.width = size; cv.height = size;

  // 1. Draw Template
  ctx.drawImage(tmplImg, 0, 0, size, size);

  // 2. Draw Clipped User Image
  const cx = CIRCLE.fx * size, cy = CIRCLE.fy * size, r = CIRCLE.fr * size;
  
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();

  const iw = rawImg.width, ih = rawImg.height;
  const aspect = Math.max((r*2)/iw, (r*2)/ih) * cs.scale;
  const sw = iw * aspect, sh = ih * aspect;
  
  ctx.drawImage(rawImg, cx - sw * cs.x, cy - sh * cs.y, sw, sh);
  ctx.restore();

  // 3. Draw Name
  const nameY = cy + r + size * 0.10;
  ctx.textAlign = 'center';
  ctx.font = `bold ${Math.round(size * 0.05)}px sans-serif`;
  ctx.fillStyle = '#C00000';
  ctx.fillText(user.name, cx, nameY);
}

async function downloadDP() {
  const cv = document.getElementById('mainCanvas');
  const link = document.createElement('a');
  link.download = `Vardhaman_DP_${user.name.replace(/\s/g,'_')}.png`;
  link.href = cv.toDataURL('image/png', 1.0);
  link.click();
}
</script>
</body>
</html>
