<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vardhaman Varshitapotsav — DP Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ── Reset & tokens ──────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4A017; --gold2:#F5D06A; --teal:#0f5c4a; --bg:#fdf8ef;
  --card:#fff; --text:#1a1209; --border:#e8d9b8;
  --shadow:0 4px 24px rgba(60,30,0,.15); --radius:20px;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden}

.page{max-width:480px;margin:0 auto;padding:0 20px 60px}

header{
  background:linear-gradient(135deg,#1a0a00 0%,#3b1a00 50%,#0f5c4a 100%);
  padding:40px 20px; text-align:center; margin-bottom:30px;
  border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
}
header h1{ font-family:'Cinzel',serif; font-size:22px; color:var(--gold2); }

.card {
  background: var(--card); padding: 30px 20px; border-radius: var(--radius);
  box-shadow: var(--shadow); text-align: center; border: 1px solid var(--border);
}

.field{margin-bottom:20px; text-align: left;}
.field label{display:block; font-size:11px; font-weight:800; color:var(--teal); margin-bottom:8px; text-transform:uppercase;}
.field input{ width:100%; padding:14px; border:2px solid #f0f0f0; border-radius:10px; font-size:15px; }

.crop-host {
  position:relative; border-radius:var(--radius); overflow:hidden;
  background:#000; touch-action:none; aspect-ratio:1/1; width:100%; cursor: move;
}
.crop-host canvas { width: 100%; height: 100%; display: block; }

.edit-hint {
  font-size: 13px; color: var(--gold); font-weight: 700; margin-top: 12px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.btn{ width:100%; padding:15px; border-radius:10px; font-size:16px; font-weight:800; cursor:pointer; border:none; transition:0.2s; }
.btn-primary{ background: var(--gold); color:#fff; }
.btn-success{ background: var(--teal); color:#fff; margin-top: 20px;}

.screen{display:none; animation:fadeUp 0.4s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0; transform:translateY(20px)}to{opacity:1; transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <h1>Vardhaman Varshitapotsav</h1>
</header>

<div class="page">
  <div id="s1" class="screen active">
    <div class="card">
      <h2 style="margin-bottom:10px; color:var(--teal);">Create Your DP</h2>
      <p style="margin-bottom:25px; color:#666;">Start by selecting your photo</p>
      <div style="border: 2px dashed var(--border); padding: 50px 20px; border-radius: 15px; cursor: pointer; background:#fdfaf4;" onclick="document.getElementById('fileInput').click()">
        <p style="color: var(--teal); font-weight: 700;">Tap to Select Photo</p>
        <p style="font-size:12px; color:#9a8a6a; margin-top:5px;">JPG, PNG or WEBP</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)" />
    </div>
  </div>

  <div id="s2" class="screen">
    <div class="card">
      <div class="field">
        <label>Enter Your Name</label>
        <input type="text" id="inp-name" placeholder="Name to show on DP" oninput="draw()" />
      </div>
      
      <div class="crop-host" id="cropHost">
        <canvas id="mainCanvas"></canvas>
      </div>
      
      <div class="edit-hint">
        <span>👆 Edit: Drag to move • Pinch to zoom</span>
      </div>

      <button class="btn btn-success" id="dlBtn" onclick="downloadDP()">⬇ Download My DP</button>
      <button class="btn" style="color:#999; margin-top:10px;" onclick="location.reload()">Change Photo</button>
    </div>
  </div>
</div>

<script>
const BASE_URL = window.location.origin;
const CIRCLE = { fx: 0.50, fy: 0.308, fr: 0.142 };

let rawImg = null, tmplImg = null;
let cs = { x: 0.5, y: 0.5, scale: 1 };
let isDragging = false, startX, startY, startTouchDist = 0;

const tmpl = new Image();
tmpl.src = BASE_URL + '/template.jpg';
tmpl.onload = () => { tmplImg = tmpl; };

function handleFile(e) {
  const f = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { 
      rawImg = img; 
      cs = { x: 0.5, y: 0.5, scale: 1 };
      document.getElementById('s1').classList.remove('active');
      document.getElementById('s2').classList.add('active');
      initInteraction();
      draw();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
}

function initInteraction() {
  const el = document.getElementById('cropHost');
  el.onmousedown = e => { isDragging = true; startX = e.clientX; startY = e.clientY; };
  window.onmousemove = e => {
    if(!isDragging) return;
    cs.x -= (e.clientX - startX) / (el.offsetWidth * cs.scale);
    cs.y -= (e.clientY - startY) / (el.offsetHeight * cs.scale);
    startX = e.clientX; startY = e.clientY;
    draw();
  };
  window.onmouseup = () => isDragging = false;

  el.ontouchstart = e => {
    isDragging = true;
    if(e.touches.length === 2) {
      startTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    } else {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    }
  };
  el.ontouchmove = e => {
  e.preventDefault();
  if(e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    
    // Calculate the ratio and apply a power factor (1.5) to boost speed
    let ratio = dist / startTouchDist;
    cs.scale *= Math.pow(ratio, 1.5); 
    
    startTouchDist = dist;
  } else {
    // Keep your existing dragging logic here
    cs.x -= (e.touches[0].clientX - startX) / (el.offsetWidth * cs.scale);
    cs.y -= (e.touches[0].clientY - startY) / (el.offsetHeight * cs.scale);
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
  }
  draw();
};
  el.ontouchend = () => isDragging = false;

  el.onwheel = e => {
  e.preventDefault();
  // Increased multiplier from 0.001 to 0.005 for faster response
  const zoomSpeed = 0.005;
  const delta = -e.deltaY * zoomSpeed;
  
  // Exponential scaling feels smoother and faster
  cs.scale *= (1 + delta);
  
  // Constraints to keep zoom within reasonable limits
  cs.scale = Math.max(0.1, Math.min(10, cs.scale));
  draw();
};
}

function draw() {
  const cv = document.getElementById('mainCanvas');
  const ctx = cv.getContext('2d');
  if(!tmplImg || !rawImg) return;

  const size = tmplImg.width;
  cv.width = size; cv.height = size;
  ctx.drawImage(tmplImg, 0, 0, size, size);

  const cx = CIRCLE.fx * size, cy = CIRCLE.fy * size, r = CIRCLE.fr * size;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();

  const iw = rawImg.width, ih = rawImg.height;
  const aspect = Math.max((r*2)/iw, (r*2)/ih) * cs.scale;
  const sw = iw * aspect, sh = ih * aspect;
  ctx.drawImage(rawImg, cx - sw * cs.x, cy - sh * cs.y, sw, sh);
  ctx.restore();

  const name = document.getElementById('inp-name').value;
  const nameY = cy + r + size * 0.10;
  ctx.textAlign = 'center';
  ctx.font = `bold ${Math.round(size * 0.052)}px sans-serif`;
  ctx.fillStyle = '#C00000';
  ctx.fillText(name, cx, nameY);
}

async function downloadDP() {
  const nameValue = document.getElementById('inp-name').value.trim() || 'User';
  const cv = document.getElementById('mainCanvas');

  // 1. Immediate Download (This always works)
  const link = document.createElement('a');
  const safeName = nameValue.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
  link.download = `Vardhaman_DP_${safeName}.png`;
  link.href = cv.toDataURL('image/png', 1.0);
  link.click();

  // 2. Background Tracking (Wrapped to never show an alert/error to user)
  fetch(`${window.location.origin}/api/track`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      name: nameValue, 
      imageHash: typeof imgHash !== 'undefined' ? imgHash : 'no-hash' 
    })
  })
  .then(res => res.json())
  .then(data => console.log('Tracked:', data))
  .catch(err => console.warn('Tracking failed but DP was saved:', err));
  
  // Show a success toast instead of an error
  if(typeof showToast === 'function') showToast('✅ DP Saved Successfully!');
}
</script>
</body>
</html>
