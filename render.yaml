services:
  - type: web
    name: vardhaman-dp-generator
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Supabase (persistent database — free tier) ──────────────────────────
      # Get these from: supabase.com → your project → Settings → API
      - key: SUPABASE_URL
        value: https://YOUR_PROJECT_ID.supabase.co
      - key: SUPABASE_KEY
        value: YOUR_ANON_OR_SERVICE_ROLE_KEY
      # ── Admin dashboard protection ──────────────────────────────────────────
      - key: ADMIN_TOKEN
        value: changeme123
